version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: rag-postgres
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: ragpass
      POSTGRES_DB: rag_docs
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/deploy/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d rag_docs"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - rag-net

  ollama:
    image: ollama/ollama:latest
    container_name: rag-ollama
    ports:
      - "11435:11434"
    volumes:
      - ollama_models:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - rag-net

  backend:
    build:
      context: ./backend
      dockerfile: deploy/Dockerfile.api
    container_name: rag-backend
    ports:
      - "8080:8080"
    environment:
      - DB_CONN=postgres://rag:ragpass@postgres:5432/rag_docs
      - OLLAMA_URL=http://ollama:11434
      - PORT=8080
    volumes:
      - ./backend/cache:/app/cache
      - ./storage/uploads:/app/storage/uploads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - rag-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rag-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - RAG_API_URL=http://backend:8080/api/search
      - OLLAMA_URL=http://ollama:11434/api/generate
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - rag-net

networks:
  rag-net:
    driver: bridge

volumes:
  pgdata:
  ollama_models:
